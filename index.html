<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quiz BP">
  <link rel="apple-touch-icon" href="assests/kawaii.png">
  <title>BLACKPINK Quiz - Conversions m ↔ dm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Start screen -->
  <div id="start-screen" class="screen active">
    <h1>Quiz Conversions</h1>
    <p class="subtitle">m ↔ dm ↔ cm ↔ mm</p>

    <div class="config-panel">
      <label class="config-label">
        Nombre de questions
        <select id="cfg-questions" class="config-select">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="40" selected>40</option>
          <option value="50">50</option>
        </select>
      </label>
      <label class="config-label">
        Temps par question
        <select id="cfg-time-per-q" class="config-select">
          <option value="0">Pas de limite</option>
          <option value="10">10s</option>
          <option value="15">15s</option>
          <option value="20" selected>20s</option>
          <option value="30">30s</option>
        </select>
      </label>
      <label class="config-label">
        Durée globale (minutes)
        <select id="cfg-global-time" class="config-select">
          <option value="0">Illimitée</option>
          <option value="5">5 min</option>
          <option value="10" selected>10 min</option>
          <option value="15">15 min</option>
          <option value="20">20 min</option>
          <option value="30">30 min</option>
        </select>
      </label>
    </div>

    <button id="btn-start" class="btn-pink">Commencer 🎤</button>
  </div>

  <!-- Quiz screen -->
  <div id="quiz-screen" class="screen">
    <div class="logo quiz-logo">💗 BLACKPINK 💗</div>
    <div class="top-bar">
      <div class="score-display">⭐ <span id="score">0</span></div>
      <div class="question-count">Q<span id="q-num">1</span>/<span id="q-total">10</span></div>
      <div class="timer-display" id="timer">⏱ 20s</div>
    </div>
    <div class="timer-bar"><div id="timer-bar-fill" class="timer-bar-fill"></div></div>

    <div class="quiz-layout">
      <div class="celebration-overlay hidden" id="celebration">
        <div class="celebration-content">
          <div class="celebration-text">🎉 Bravo ! 🎉</div>
          <img id="celebration-gif" class="celebration-gif" src="" alt="Blackpink celebration">
        </div>
      </div>
      <div class="quiz-main">
        <div class="question-card">
          <p id="question-text" class="question-text"></p>
          <div class="answer-area">
            <input type="number" id="answer-input" class="answer-input" placeholder="Ta réponse..." autocomplete="off">
            <span id="answer-unit" class="answer-unit"></span>
          </div>
          <button id="btn-validate" class="btn-pink">Valider ✨</button>
          <div class="numpad" id="numpad">
            <button class="numpad-btn" data-val="1">1</button>
            <button class="numpad-btn" data-val="2">2</button>
            <button class="numpad-btn" data-val="3">3</button>
            <button class="numpad-btn" data-val="4">4</button>
            <button class="numpad-btn" data-val="5">5</button>
            <button class="numpad-btn" data-val="6">6</button>
            <button class="numpad-btn" data-val="7">7</button>
            <button class="numpad-btn" data-val="8">8</button>
            <button class="numpad-btn" data-val="9">9</button>
            <button class="numpad-btn numpad-del" data-val="del">⌫</button>
            <button class="numpad-btn" data-val="0">0</button>
            <button class="numpad-btn numpad-dot" data-val=".">.</button>
          </div>
        </div>
      </div>

      <div class="right-column">
        <div class="global-timer-num" id="global-timer"></div>
        <div class="retry-panel" id="retry-panel">
          <h3>🔄 À revoir</h3>
          <ul id="retry-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <!-- End screen -->
  <div id="end-screen" class="screen">
    <div class="logo">💗 BLACKPINK 💗</div>
    <h2 id="end-message"></h2>
    <p id="end-score"></p>
    <button id="btn-restart" class="btn-pink">Rejouer 🎤</button>
  </div>

  <!-- History panel (desktop only) -->
  <div id="history-panel" class="history-panel" style="display:none;">
    <h3>📊 Historique</h3>
    <ul id="history-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
